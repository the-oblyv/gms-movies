<!DOCTYPE html>
<html lang="en">

<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-26MNY5FFJJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-26MNY5FFJJ');
    </script>
    <link rel='shortcut icon' type='image/x-icon' href='/favicon.ico' />
    <script src="/assets/js/font.js"></script>
    <meta name="google" content="notranslate" />
    <link rel="stylesheet" type="text/css" href="/assets/css/style.css" />
    <link rel="stylesheet" type="text/css" href="/assets/css/media.css" />
    <link rel="stylesheet" type="text/css" href="/assets/css/nav.css" />
    <link rel="stylesheet" type="text/css" href="/assets/css/watch.css" />
    <title>Watch TV Shows Free Online - Moviiflix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Rednotsus" />
    <meta http-equiv="Cache-control" content="public">
    <meta charset="utf-8">
    <meta name="description" content="Watch your favorite movies, tv shows, and anime for free on Moviiflix!" />

    <style>
        /* Custom styles for the Play button positioning */
        .game {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .controls-container {
            padding: 10px 0;
            display: flex;
            justify-content: flex-start;
        }

        #playPauseBtn {
            background-color: #e50914; /* Moviiflix Red */
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s ease;
        }

        #playPauseBtn:hover {
            background-color: #b20710;
        }

        #playPauseBtn:active {
            transform: scale(0.98);
        }
    </style>

    <script src="/assets/js/watchtv.js"></script>
</head>

<body>
    <nav>
        <div class="navbar">
            <a id="nav-title" href="/"><img src="/img/logo.png" alt="Moviiflix Logo"></a>
            <a href="/movies"><i class="fa-solid fa-video">&nbsp;</i>Movies</a>
            <a href="/tv"><i class="fa-solid fa-tv">&nbsp;</i>TV Series</a>
        </div>
    </nav>

    <div id="gameframe">
        <div class="gameDisplay">
            <div class="game">
                <iframe id="iframe" src="" allowfullscreen></iframe>
                
                <div class="controls-container">
                    <button id="playPauseBtn" title="Simulate Spacebar">
                        <i class="fa-solid fa-play"></i>
                        <span>Play / Pause</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="episode-selector">
            <div id="seasonSelectorContainer">
                <select id="seasonSelector"></select>
            </div>
            <div id="episodeList" class="scrollable-box"></div>
        </div>
    </div>

    <script>
        document.getElementById('playPauseBtn').addEventListener('click', function() {
            const iframe = document.getElementById('iframe');

            // 1. Focus the iframe so it can receive the command
            iframe.focus();

            // 2. Create the Spacebar event
            const spaceEvent = new KeyboardEvent('keydown', {
                key: ' ',
                code: 'Space',
                keyCode: 32,
                which: 32,
                bubbles: true,
                cancelable: true
            });

            // 3. Dispatch the event to the document
            // Note: If the iframe is from a different domain (cross-origin), 
            // the focus() call is the most reliable way to make the player toggle.
            document.dispatchEvent(spaceEvent);
            
            // Attempt to dispatch directly to the iframe window 
            // (Works only if hosted on the same domain)
            try {
                iframe.contentWindow.document.dispatchEvent(spaceEvent);
            } catch (e) {
                // Cross-origin prevents direct dispatch, but focus() usually handles it
                console.log("Cross-origin restriction: Standard focus applied.");
            }
        });
    </script>
</body>

</html>
